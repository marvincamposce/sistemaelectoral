[package]
name = "zk_tally_rs"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
ark-bn254 = "0.5.0"
ark-circom = "0.5.0"
ark-ff = "0.5.0"
ark-groth16 = "0.5.0"
ark-snark = "0.5.1"
ark-serialize = "0.5.0"
clap = { version = "4.5.20", features = ["derive"] }
num-bigint = "0.4.6"
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["rt-multi-thread"] }
